services:
  # --- Database Storage ---
  # We will use DuckDB in a shared volume for persistence
  # and access from multiple services

  # --- Orchestrator & Ingestion ---
  prefect-server:
    image: prefecthq/prefect:3.7-python3.14
    command: prefect server start
    ports:
      - "4200:4200"
    environment:
      - PREFECT_API_URL=http://localhost:4200/api
      - PREFECT_SERVER_API_HOST=0.0.0.0
    volumes:
      - prefect_data:/root/.prefect

  prefect-agent:
    image: prefecthq/prefect:3.7-python3.14
    command: >
      /bin/sh -c "
      pip install pandas requests pygithub pypistats duckdb;
      python pipeline/deploy.py"
    depends_on:
      - prefect-server
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    volumes:
      - .:/opt/prefect/project
      - ./data:/data
    working_dir: /opt/prefect/project

volumes:
  prefect_data: